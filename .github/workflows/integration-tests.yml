name: Nightly Integration Tests

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      test_filter:
        description: 'Test filter pattern (e.g., TestSimple*)'
        required: false
        default: ''

env:
  TF_VERSION: '1.6.0'
  GO_VERSION: '1.21'
  AWS_REGION: 'us-east-1'

jobs:
  setup:
    name: Setup Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set test matrix
        id: set-matrix
        run: |
          echo 'matrix={"test": ["TestSimpleExampleSingleAccount"]}' >> $GITHUB_OUTPUT

  terratest:
    name: Terratest - ${{ matrix.test }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GithubActions-IntegrationTest
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Download Go modules
        working-directory: test
        run: go mod download

      - name: Run integration test
        working-directory: test
        timeout-minutes: 45
        env:
          TEST_FILTER: ${{ github.event.inputs.test_filter || matrix.test }}
        run: |
          go test -v -timeout 40m -run "^${TEST_FILTER}$" 2>&1 | tee test-output.log

      - name: Parse test results
        if: always()
        id: test-results
        working-directory: test
        run: |
          if grep -q "PASS" test-output.log && ! grep -q "FAIL" test-output.log; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=All tests passed ✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=Tests failed ❌" >> $GITHUB_OUTPUT
          fi

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.test }}
          path: test/test-output.log
          retention-days: 30

      - name: Check for leftover resources
        if: always()
        run: |
          echo "Checking for resources that weren't cleaned up..."
          
          # Check for VPCs with our test prefix
          vpcs=$(aws ec2 describe-vpcs \
            --filters "Name=tag:ManagedBy,Values=Terraform" "Name=tag:Example,Values=simple" \
            --query 'Vpcs[*].VpcId' --output text)
          
          if [ -n "$vpcs" ]; then
            echo "⚠️ Warning: Found leftover VPCs: $vpcs"
            echo "leftover_resources=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No leftover VPCs found"
          fi

  cleanup:
    name: Cleanup Orphaned Resources
    runs-on: ubuntu-latest
    needs: terratest
    if: always()
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find and cleanup test resources
        run: |
          echo "Searching for orphaned test resources..."
          
          # Find VPCs older than 2 hours with test tags
          cutoff_time=$(date -u -d '2 hours ago' +%Y-%m-%dT%H:%M:%S)
          
          # This is a safety check - in production, implement more sophisticated cleanup
          echo "Resources older than $cutoff_time will be flagged for review"
          
          # List resources (don't auto-delete to prevent accidents)
          aws ec2 describe-vpcs \
            --filters "Name=tag:ManagedBy,Values=Terraform" \
            --query "Vpcs[?CreationTime<'$cutoff_time'].{ID:VpcId,Created:CreationTime,Name:Tags[?Key=='Name']|[0].Value}" \
            --output table

      - name: Send cleanup notification
        if: failure()
        run: |
          echo "⚠️ Manual cleanup may be required for orphaned resources"
          # Add notification logic here (Slack, email, etc.)

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [terratest, cleanup]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Generate summary report
        run: |
          echo "## 🧪 Nightly Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if test artifacts exist
          if [ -d "test-results" ]; then
            echo "### Test Logs" >> $GITHUB_STEP_SUMMARY
            ls -la test-results/
          else
            echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check test status
        run: |
          if [ "${{ needs.terratest.result }}" == "success" ]; then
            echo "✅ All integration tests passed!" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ Some integration tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: report
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "Integration tests failed. Notification would be sent here."
          # Implement notification:
          # - Slack webhook
          # - Email via SES
          # - PagerDuty
          # - etc.

  cost-check:
    name: Cost Analysis
    runs-on: ubuntu-latest
    needs: terratest
    if: always()
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Estimate test costs
        run: |
          echo "## 💰 Cost Estimate for Test Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get cost from last 24 hours for test resources
          start_date=$(date -u -d '1 day ago' +%Y-%m-%d)
          end_date=$(date -u +%Y-%m-%d)
          
          echo "Estimated costs from $start_date to $end_date:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- NAT Gateway: ~\$0.05/hour × test duration" >> $GITHUB_STEP_SUMMARY
          echo "- Other services: ~\$0.10/test run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Estimated total:** ~\$0.50 - \$2.00 per test run" >> $GITHUB_STEP_SUMMARY
